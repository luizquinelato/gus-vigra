# docker-compose.db-dev.yml — DEV Environment
# Project : Vigra
# Variant : pgvector (postgres 18 + vector extension, replaces Qdrant)
# Generated by gus-factory / create_project.py
# ──────────────────────────────────────────────────────────────────
# Copied to the project root by scripts/switch_postgres_variant.py.
# To switch variants: `python scripts/switch_postgres_variant.py pgvector`

name: gus-vigra-dev

services:

  # ── PostgreSQL DEV ─────────────────────────────────────────────
  postgres-dev:
    image: pgvector/pgvector:pg18-trixie
    container_name: vigra-postgres-dev
    command: >
      postgres
      --hba-file=/etc/saas-vigra-config/pg_hba.conf
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=128
      -c hot_standby=on
    environment:
      POSTGRES_DB:       vigra_dev
      POSTGRES_USER:     vigra
      POSTGRES_PASSWORD: vigra
      PGDATA:            /var/lib/postgresql/data
      TZ:                America/Sao_Paulo
      PGTZ:              America/Sao_Paulo
    ports:
      - "5454:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./infra/postgres/primary:/docker-entrypoint-initdb.d
      - ./infra/postgres/primary/postgresql.conf:/etc/saas-vigra-config/postgresql.conf:ro
      - ./infra/postgres/primary/pg_hba.conf:/etc/saas-vigra-config/pg_hba.conf:ro
    networks:
      - vigra-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigra -d vigra_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL DEV Replica (DB_ENABLE_REPLICA=true) ────────────
  postgres-dev-replica:
    image: pgvector/pgvector:pg18-trixie
    container_name: vigra-postgres-dev-replica
    entrypoint: ["/replica/entrypoint.sh"]
    environment:
      POSTGRES_DB:       vigra_dev
      POSTGRES_USER:     vigra
      POSTGRES_PASSWORD: vigra
      PGDATA:                        /var/lib/postgresql/data
      POSTGRES_PRIMARY_HOST:         postgres-dev
      POSTGRES_PRIMARY_PORT:         5432
      POSTGRES_REPLICATION_USER:     replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_password
      TZ:                            America/Sao_Paulo
      PGTZ:                          America/Sao_Paulo
    ports:
      - "5455:5432"
    volumes:
      - postgres_data_dev_replica:/var/lib/postgresql/data
      - ./infra/postgres/replica/entrypoint.sh:/replica/entrypoint.sh
    networks:
      - vigra-network-dev
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigra -d vigra_dev"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Redis DEV (included if CACHE_LAYER=Redis) ──────────────────
  redis-dev:
    image: redis:7-alpine
    container_name: vigra-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6389:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - vigra-network-dev
    restart: unless-stopped


  # ── Qdrant DEV (included if EMBEDDING_DB=Qdrant) ──────────────
  qdrant-dev:
    image: qdrant/qdrant:latest
    container_name: vigra-qdrant-dev
    ports:
      - "6347:6333"
      - "6348:6334"
    volumes:
      - qdrant_data_dev:/qdrant/storage
    networks:
      - vigra-network-dev
    restart: unless-stopped

volumes:
  postgres_data_dev:
    name: vigra_postgres_data_dev
  postgres_data_dev_replica:
    name: vigra_postgres_data_dev_replica
  redis_data_dev:
    name: vigra_redis_data_dev
  qdrant_data_dev:
    name: vigra_qdrant_data_dev

networks:
  vigra-network-dev:
    driver: bridge
    name: vigra-network-dev

