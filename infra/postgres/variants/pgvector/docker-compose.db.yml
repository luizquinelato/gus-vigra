# docker-compose.db.yml — PROD Environment
# Project : Vigra
# Variant : pgvector (postgres 18 + vector extension, replaces Qdrant)
# Generated by gus-factory / create_project.py
# ──────────────────────────────────────────────────────────────────
# Copied to the project root by scripts/switch_postgres_variant.py.
# To switch variants: `python scripts/switch_postgres_variant.py pgvector`

name: gus-vigra

services:

  # ── PostgreSQL PROD ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: vigra-postgres
    command: >
      postgres
      --hba-file=/etc/saas-vigra-config/pg_hba.conf
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=128
      -c hot_standby=on
    environment:
      POSTGRES_DB:       vigra
      POSTGRES_USER:     vigra
      POSTGRES_PASSWORD: vigra
      PGDATA:            /var/lib/postgresql/data
      TZ:                America/Sao_Paulo
      PGTZ:              America/Sao_Paulo
    ports:
      - "5452:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./infra/postgres/primary:/docker-entrypoint-initdb.d
      - ./infra/postgres/primary/postgresql.conf:/etc/saas-vigra-config/postgresql.conf:ro
      - ./infra/postgres/primary/pg_hba.conf:/etc/saas-vigra-config/pg_hba.conf:ro
    networks:
      - vigra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigra -d vigra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL PROD Replica (DB_ENABLE_REPLICA=true) ───────────
  postgres-replica:
    image: pgvector/pgvector:pg18-trixie
    container_name: vigra-postgres-replica
    entrypoint: ["/replica/entrypoint.sh"]
    environment:
      POSTGRES_DB:       vigra
      POSTGRES_USER:     vigra
      POSTGRES_PASSWORD: vigra
      PGDATA:                        /var/lib/postgresql/data
      POSTGRES_PRIMARY_HOST:         postgres
      POSTGRES_PRIMARY_PORT:         5432
      POSTGRES_REPLICATION_USER:     replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_password
      TZ:                            America/Sao_Paulo
      PGTZ:                          America/Sao_Paulo
    ports:
      - "5453:5432"
    volumes:
      - postgres_data_prod_replica:/var/lib/postgresql/data
      - ./infra/postgres/replica/entrypoint.sh:/replica/entrypoint.sh
    networks:
      - vigra-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigra -d vigra"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Redis PROD (included if CACHE_LAYER=Redis) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: vigra-redis
    command: redis-server --appendonly yes
    ports:
      - "6388:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - vigra-network
    restart: unless-stopped


  # ── Qdrant PROD (included if EMBEDDING_DB=Qdrant) ──────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vigra-qdrant
    ports:
      - "6345:6333"
      - "6346:6334"
    volumes:
      - qdrant_data_prod:/qdrant/storage
    networks:
      - vigra-network
    restart: unless-stopped

volumes:
  postgres_data_prod:
    name: vigra_postgres_data_prod
  postgres_data_prod_replica:
    name: vigra_postgres_data_prod_replica
  redis_data_prod:
    name: vigra_redis_data_prod
  qdrant_data_prod:
    name: vigra_qdrant_data_prod

networks:
  vigra-network:
    driver: bridge
    name: vigra-network

