# =============================================================
# infra/postgres/primary/postgresql.conf
# PostgreSQL 18 — Primary (WAL replication enabled)
#
# HOW IT IS APPLIED:
#   Mounted via docker-compose as read-only. The init script
#   02-apply-config.sh copies it to $PGDATA on first start.
#   WAL params are also passed via docker-compose `command:` as
#   a safety net in case this file is not mounted.
# =============================================================

# ── CONNECTIONS ──────────────────────────────────────────────
listen_addresses = '*'
port             = 5432
max_connections  = 100

# ── MEMORY ───────────────────────────────────────────────────
shared_buffers        = 256MB
effective_cache_size  = 1GB
work_mem              = 4MB
maintenance_work_mem  = 64MB

# ── WAL / REPLICATION ────────────────────────────────────────
wal_level             = replica      # required for streaming replication
max_wal_senders       = 3            # max replica connections
max_replication_slots = 3            # one per replica (+ spare)
wal_keep_size         = 64MB         # retain WAL for slow replicas
hot_standby           = on
hot_standby_feedback  = on
synchronous_standby_names = ''       # async replication (higher performance)

# ── REPLICATION COMMANDS LOGGING ─────────────────────────────
log_replication_commands = on

# ── CHECKPOINTS ──────────────────────────────────────────────
checkpoint_completion_target = 0.9
checkpoint_timeout           = 10min
max_wal_size                 = 2GB
min_wal_size                 = 80MB

# ── PERFORMANCE ──────────────────────────────────────────────
random_page_cost          = 1.1
effective_io_concurrency  = 200
bgwriter_delay            = 200ms
bgwriter_lru_maxpages     = 100
bgwriter_lru_multiplier   = 2.0

# ── LOCK MANAGEMENT ──────────────────────────────────────────
deadlock_timeout   = 1s
lock_timeout       = 30s
statement_timeout  = 300s

# ── LOGGING ──────────────────────────────────────────────────
log_destination    = 'stderr'
log_min_messages   = warning
log_min_duration_statement = 1000   # log queries > 1 s

# ── LOCALE ───────────────────────────────────────────────────
timezone                   = 'America/Sao_Paulo'
default_text_search_config = 'pg_catalog.simple'
