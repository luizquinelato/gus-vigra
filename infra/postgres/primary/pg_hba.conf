# =============================================================
# infra/postgres/primary/pg_hba.conf
# Mounted via docker-compose and loaded with --hba-file.
# Applied on every container start (not just first init).
# =============================================================

# TYPE   DATABASE     USER         ADDRESS        METHOD
# Local socket — used by docker-entrypoint init scripts
local    all          all                         trust

# Regular app connections over TCP (password required)
host     all          all          all            scram-sha-256

# Replication from the replica container (trust inside Docker network)
host     replication  replicator   all            trust
